# Basic
- type: entity
  id: WindowDirectionalCornerConcave
  parent: WindowDirectional
  name: concave corner window
  components:
  - type: Sprite
    sprite: /Textures/_DV/Structures/Windows/directional_corners_concave.rsi
    state: window
  - type: Icon
    sprite: /Textures/_DV/Structures/Windows/directional_corners_concave.rsi
    state: window
  - type: Tag
    tags:
      - Window
      - Directional
      - ForceNoFixRotations
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,0.5,-0.28125,-0.5"
        mask:
        - FullTileMask
        layer:
        - GlassLayer
      fix2:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.28125,-0.28125,0.5,-0.5"
        mask:
        - FullTileMask
        layer:
        - GlassLayer
  - type: Construction
    graph: WindowCornerRecipesConcave
    node: windowCorner
  - type: Appearance
  - type: DamageVisuals
    thresholds: [5, 10, 20]
    trackAllDamage: true
    damageOverlay:
      sprite: _DV/Structures/Windows/cracks_corners_concave.rsi

