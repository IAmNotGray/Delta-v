# Basic
- type: entity
  id: WindowDirectionalCorner
  parent: WindowDirectional
  name: convex corner window
  components:
  - type: Sprite
    sprite: /Textures/_DV/Structures/Windows/directional_corners.rsi
    state: window
  - type: Icon
    sprite: /Textures/_DV/Structures/Windows/directional_corners.rsi
    state: window
  - type: Tag
    tags:
      - Window
      - Directional
      - ForceNoFixRotations
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,-0.28125,-0.28125"
        mask:
        - FullTileMask
        layer:
        - GlassLayer
  - type: Construction
    graph: WindowCornerRecipes
    node: windowCorner
  - type: Appearance
  - type: DamageVisuals
    thresholds: [5, 10, 20]
    trackAllDamage: true
    damageOverlay:
      sprite: /Textures/_DV/Structures/Windows/cracks_corners.rsi

