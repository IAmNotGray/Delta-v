- type: entity
  id: FloorTileItemMowedAstroSnow
  parent: FloorTileItemBase
  name: mowed astro-snow
  description: Fake snow that's as fluffy as the real thing, while being easily removable!
  components:
  - type: Sprite
    state: snow
  - type: Item
    heldPrefix: snow
  - type: FloorTile
    outputs:
    - Plating
    - FloorMowedAstroSnow
  - type: Stack
    stackType: FloorTileMowedAstroSnow

