- type: entity
  id: FloorTileItemMowedAstroSnow
  parent: FloorTileItemBase
  name: mowed astro-snow
  description: Fake snow that's as fluffy as the real thing, while being easily removable!
  components:
  - type: Sprite
    state: snow
  - type: Item
    heldPrefix: snow
  - type: FloorTile
    outputs:
    - Plating
    - FloorMowedAstroSnow
  - type: Stack
    stackType: FloorTileMowedAstroSnow

- type: entity
  id: FloorTileItemAstroGrassPurple
  parent: FloorTileItemBase
  name: chromite astro-grass
  description: Fake grass that covers up wires and even comes with realistic NanoTrimmings!
  components:
  - type: Sprite
    sprite: _DV/Objects/Tiles/tile.rsi
    state: grasspurple
  - type: Item
    sprite: _DV/Objects/Tiles/tile.rsi
    heldPrefix: purple
  - type: FloorTile
    outputs:
    - Plating
    - FloorAstroGrassChromite
  - type: Stack
    stackType: FloorTileAstroGrassPurple

